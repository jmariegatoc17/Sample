<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jessica Marie Malabanan/title>
    <style>
        /* Reset basic styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Base page styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f9;
        }

        /* Navigation Bar */
        header {
            background-color: #1a252f;
            color: #fff;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        nav .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #3498db;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 20px;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: #3498db;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://picsum.photos') no-repeat center center/cover;
            color: #fff;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            background-color: #3498db;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        /* Main Content Container */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        /* Media query for mobile layouts */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            nav ul {
                display: none; /* Simplification for code brevity */
            }
        }

        main {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        main h2 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        main p {
            margin-bottom: 15px;
        }

        /* Sidebar styling */
        aside {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            height: fit-content;
        }

        aside h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        /* Footer */
        footer {
            background-color: #1a252f;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <!-- Top Navigation Bar -->
    <header>
        <nav>
            <div class="logo">BrandName</div>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Visual Hero Image Section -->
    <section class="hero">
        <h1>Welcome to Your New Website</h1>
        <p>Built purely with clean, semantic HTML5 and CSS3.</p>
        <a href="#contact" class="btn">Get Started</a>
    </section>

    <!-- Content Area Split into Main and Sidebar -->
    <div class="container">
        <main>
            <h2>Main Articles & Announcements</h2>
            <p>This is the primary section where your main text goes. The template features a modern responsive layout structure that dynamically changes shape based on screen sizes.</p>
            <p>You can add paragraphs, images, videos, or contact forms seamlessly into this sector to design your custom landing page experience.</p>
        </main>

        <aside>
            <h3>Sidebar Widget</h3>
            <p>Great for displaying shortcuts, social profile widgets, dynamic tags, or contact details.</p>
        </aside>
    </div>

    <!-- Bottom Footer Area -->
    <footer>
        <p>&copy; 2026 BrandName. All rights reserved.</p>
    </footer>

</body>
</html>
